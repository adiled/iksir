name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create GitHub Release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          BODY=$(git for-each-ref "refs/tags/$TAG" --format='%(contents:body)' 2>/dev/null)
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            BODY=$(git for-each-ref "refs/tags/$TAG" --format='%(contents:subject)' 2>/dev/null)
          fi
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            PREV=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
            BODY=$(git log --pretty=format:"- %s" ${PREV}..${TAG} 2>/dev/null || echo "Release $TAG")
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
